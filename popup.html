<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cognitive Load Meter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="popup-body">
    <main class="popup-shell">
      <button class="popup-state-card popup-start-card" id="welcomeView" type="button" hidden>
        <span class="popup-state-ring popup-state-ring-off">
          <span class="popup-state-core"></span>
        </span>
        <span class="popup-state-label">Tracking Off</span>
        <span class="popup-state-note">Tap to start tracking</span>
      </button>

      <section class="popup-state-card" id="dashboardView" hidden aria-live="polite">
        <div class="popup-state-ring" id="scoreRing" style="--ring-progress: 0deg; --ring-color: #4ade80;">
          <span class="popup-state-core"></span>
        </div>
        <p class="popup-state-label" id="statusValue">Calm</p>
        <p class="popup-state-note" id="statusDescription">Rhythm feels steady</p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
